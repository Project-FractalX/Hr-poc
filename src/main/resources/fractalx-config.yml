# FractalX Decomposition Configuration
#
# Read by FractalX during `mvn fractalx:decompose`.
# Merged into each generated service's application.yml.
#
# H2 Console access
# ─────────────────
# Using NAMED IN-MEMORY H2 databases (jdbc:h2:mem:<n>).
# Reasons for switching away from file-based (jdbc:h2:file:./data/...):
#
#   PROBLEM 1 — H2 2.x error 90149:
#     H2 2.x blocks creating a new database from the browser console.
#     File databases can only be created by the app on first boot,
#     not from the console UI.
#
#   PROBLEM 2 — Relative path mismatch:
#     ./data/ resolves relative to where the JVM launched (the service folder).
#     When you open the H2 console in your browser it resolves to something
#     completely different (usually your OS user home), so it never finds the file.
#
#   PROBLEM 3 — File does not exist yet:
#     Even with the correct absolute path, the console fails if you open it
#     before the app has booted at least once.
#
# HOW TO CONNECT TO H2 CONSOLE FOR EACH SERVICE:
#   1. Start the service first  (mvn spring-boot:run inside its folder)
#   2. Open  http://localhost:<port>/h2-console  in your browser
#   3. Paste the JDBC URL from the table below — exactly as shown
#   4. User Name: sa   |   Password: (leave empty)   |   Click Connect
#
#   Service              Port   Paste this JDBC URL
#   ─────────────────────────────────────────────────────────────────────────
#   employee-service     8081   jdbc:h2:mem:employee_service
#   payroll-service      8082   jdbc:h2:mem:payroll_service
#   leave-service        8083   jdbc:h2:mem:leave_service
#   recruitment-service  8084   jdbc:h2:mem:recruitment_service
#   department-service   8085   jdbc:h2:mem:department_service
#   saga-orchestrator    8099   jdbc:h2:mem:saga_db
#   admin-service        9090   jdbc:h2:mem:admin_db
#
# NOTE: In-memory means data resets on service restart. This is expected in dev.
# DB_CLOSE_DELAY=-1 keeps the database alive for the full JVM lifetime so
# the H2 console stays connected while the service is running.
#
# For production replace datasource blocks with:
#   url: jdbc:postgresql://localhost:5432/<db_name>
#   driver-class-name: org.postgresql.Driver
#   username: <user>
#   password: <secret>

fractalx:

  # ── Global infrastructure endpoints ────────────────────────────────────────


  # Where Jaeger / OTel collector is running (used by all generated services)
  otel:
    endpoint: http://localhost:4317

  # Where the logger-service is running
  logger:
    url: http://localhost:9099

  # Where the service registry is running
  registry:
    url: http://localhost:8761

  # API Gateway settings
  gateway:
    port: 9999
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:4200"

  # Admin UI service
  admin:
    port: 9090

  # ── Per-service configuration ───────────────────────────────────────────────
  # port       — overrides the port set in @DecomposableModule
  # datasource — named in-memory H2 per service (survives JVM lifetime, not restarts)
  # jpa        — JPA/Hibernate settings merged into generated application.yml
  # h2         — enables H2 Console at http://localhost:<port>/h2-console
  # flyway     — enables Flyway migration scaffolding
  # tracing    — set enabled: false to disable OTel for a specific service

  services:

    # H2 Console: http://localhost:8081/h2-console  ->  jdbc:h2:mem:employee_service
    employee-service:
      port: 8081
      datasource:
        url: jdbc:h2:mem:employee_service;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
        driver-class-name: org.h2.Driver
        username: sa
        password: ""
#        url: jdbc:postgresql://20.204.50.224:5432/employee_service?sslmode=require
#        driver-class-name: org.postgresql.Driver
#        username: postgres
#        password: wow123
      jpa:
        show-sql: true
        hibernate:
          ddl-auto: update
      h2:
        console:
          enabled: true
      flyway:
        enabled: false
      tracing:
        enabled: true

    # H2 Console: http://localhost:8082/h2-console  ->  jdbc:h2:mem:payroll_service
    payroll-service:
      port: 8082
      datasource:
        url: jdbc:h2:mem:payroll_service;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
        driver-class-name: org.h2.Driver
        username: sa
        password: ""
#        url: jdbc:postgresql://20.204.50.224:5432/payroll_service?sslmode=require
#        driver-class-name: org.postgresql.Driver
#        username: postgres
#        password: wow123
      jpa:
        show-sql: true
        hibernate:
          ddl-auto: update
      h2:
        console:
          enabled: true
      flyway:
        enabled: false
      tracing:
        enabled: true

    # H2 Console: http://localhost:8083/h2-console  ->  jdbc:h2:mem:leave_service
    leave-service:
      port: 8083
      datasource:
        url: jdbc:h2:mem:leave_service;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
        driver-class-name: org.h2.Driver

spring:
  application:
    name: recruitment-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    password: ''
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:recruitment_service
    username: sa
    hikari:
      connection-timeout: 30000
      minimum-idle: 5
      maximum-pool-size: 10
      idle-timeout: 600000
  sql:
    init:
      mode: always
      platform: h2
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
server:
  port: 8084
fractalx:
  enabled: true
  registry:
    url: ${FRACTALX_REGISTRY_URL:http://localhost:8761}
    enabled: true
    host: ${FRACTALX_REGISTRY_HOST:localhost}
  saga:
    orchestrator:
      url: ${FRACTALX_SAGA_ORCHESTRATOR_URL:http://localhost:8099}
  observability:
    tracing: true
    metrics: true
    logger-url: ${FRACTALX_LOGGER_URL:http://localhost:9099/api/logs}
    otel:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
netscope:
  server:
    grpc:
      port: 18084
    security:
      enabled: false
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
  tracing:
    sampling:
      probability: 1.0
logging:
  level:
    org.fractalx: DEBUG
    org.fractalx.netscope: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      department-service:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        sliding-window-size: 10
      employee-service:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        sliding-window-size: 10
  retry:
    instances:
      department-service:
        max-attempts: 3
        wait-duration: 100ms
        exponential-backoff-multiplier: 2
      employee-service:
        max-attempts: 3
        wait-duration: 100ms
        exponential-backoff-multiplier: 2
  timelimiter:
    instances:
      department-service:
        timeout-duration: 2s
      employee-service:
        timeout-duration: 2s

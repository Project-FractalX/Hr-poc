# Docker profile — all values from environment variables
spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:recruitment_service}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration
fractalx:
  observability:
    otel:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4317}
    logger-url: ${FRACTALX_LOGGER_URL:http://logger-service:9099/api/logs}
netscope:
  client:
    servers:
      department-service:
        host: ${DEPARTMENT_SERVICE_HOST:department-service}
        port: ${DEPARTMENT_SERVICE_GRPC_PORT:18085}
      employee-service:
        host: ${EMPLOYEE_SERVICE_HOST:employee-service}
        port: ${EMPLOYEE_SERVICE_GRPC_PORT:18081}

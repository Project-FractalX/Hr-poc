spring:
  application:
    name: fractalx-saga-orchestrator
  datasource:
    url: jdbc:h2:mem:saga_db
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  h2:
    console:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8099

fractalx:
  observability:
    tracing: true
    metrics: true
    logger-url: ${FRACTALX_LOGGER_URL:http://localhost:9099/api/logs}
    otel:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  saga:
    owner-urls:
      onboard-employee-saga: ${ONBOARD_EMPLOYEE_SAGA_OWNER_URL:http://localhost:8081}
      approve-leave-saga: ${APPROVE_LEAVE_SAGA_OWNER_URL:http://localhost:8083}
      hire-employee-saga: ${HIRE_EMPLOYEE_SAGA_OWNER_URL:http://localhost:8084}

netscope:
  client:
    servers:
      payroll-service:
        host: localhost
        port: 18082
      department-service:
        host: localhost
        port: 18085
      employee-service:
        host: localhost
        port: 18081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    org.fractalx: INFO
    org.fractalx.netscope: DEBUG

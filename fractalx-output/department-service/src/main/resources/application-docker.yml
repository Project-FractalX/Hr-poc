# Docker profile — all values from environment variables
spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:department_service}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration
fractalx:
  observability:
    otel:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4317}
    logger-url: ${FRACTALX_LOGGER_URL:http://logger-service:9099/api/logs}

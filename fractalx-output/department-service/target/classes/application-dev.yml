# Dev profile — all services run on localhost
spring:
  datasource:
    url: jdbc:h2:mem:department_service
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration


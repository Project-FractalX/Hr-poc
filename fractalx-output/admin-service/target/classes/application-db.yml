# ================================================================
# FractalX Admin Service — Database Profile
# ================================================================
# Activate: -Dspring.profiles.active=db
#        or: SPRING_PROFILES_ACTIVE=db  (environment variable)
#        or: add spring.profiles.active=db in application.yml
#
# Supported databases:
#   H2 (default, embedded — no setup required):
#     url: jdbc:h2:./admin-service;DB_CLOSE_DELAY=-1;MODE=MySQL
#
#   MySQL 8+:
#     url: jdbc:mysql://localhost:3306/admin_db?useSSL=false&serverTimezone=UTC
#     driver-class-name: com.mysql.cj.jdbc.Driver
#     Also uncomment mysql-connector-j + flyway-mysql in pom.xml
#
#   PostgreSQL 15+:
#     url: jdbc:postgresql://localhost:5432/admin_db
#     driver-class-name: org.postgresql.Driver
#     Also uncomment postgresql driver in pom.xml
# ================================================================

spring:
  autoconfigure:
    exclude: []   # re-enable DataSource + JPA + Flyway (overrides base config)
  data:
    jpa:
      repositories:
        enabled: true
  datasource:
    url: ${ADMIN_DB_URL:jdbc:h2:./admin-service;DB_CLOSE_DELAY=-1;MODE=MySQL}
    username: ${ADMIN_DB_USERNAME:sa}
    password: ${ADMIN_DB_PASSWORD:}
    driver-class-name: ${ADMIN_DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # safe for databases with pre-existing schema

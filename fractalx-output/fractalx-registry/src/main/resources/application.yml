server:
  port: 8761

spring:
  application:
    name: fractalx-registry

fractalx:
  registry:
    evict-after-ms: 90000
    poll-interval-ms: 15000
    # Pre-seeded known services (services also self-register on startup)
    known-services:
      - name: department-service
        host: ${DEPARTMENT_SERVICE_HOST:localhost}
        port: 8085
        grpcPort: 18085
        healthUrl: http://localhost:8085/actuator/health
      - name: employee-service
        host: ${EMPLOYEE_SERVICE_HOST:localhost}
        port: 8081
        grpcPort: 18081
        healthUrl: http://localhost:8081/actuator/health
      - name: leave-service
        host: ${LEAVE_SERVICE_HOST:localhost}
        port: 8083
        grpcPort: 18083
        healthUrl: http://localhost:8083/actuator/health
      - name: payroll-service
        host: ${PAYROLL_SERVICE_HOST:localhost}
        port: 8082
        grpcPort: 18082
        healthUrl: http://localhost:8082/actuator/health
      - name: recruitment-service
        host: ${RECRUITMENT_SERVICE_HOST:localhost}
        port: 8084
        grpcPort: 18084
        healthUrl: http://localhost:8084/actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.fractalx.registry: INFO
